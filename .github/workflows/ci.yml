name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  NODE_VERSION: 22

jobs:
  # ── Frontend ──────────────────────────────────────────────────

  web-lint-typecheck:
    name: Web Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run lint
      - run: cd web && npm run typecheck

  web-test:
    name: Web Tests
    needs: web-lint-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run test -- --coverage

  # ── Go Gateway ────────────────────────────────────────────────

  gateway-test:
    name: Gateway Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: gateway/go.sum
      - run: cd gateway && go vet ./...
      - run: cd gateway && go test ./... -race -coverprofile=coverage.out

  # ── Go Microservices (matrix) ─────────────────────────────────

  services-test:
    name: Service Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user, job, payment, chat, notification]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - run: cd services/${{ matrix.service }} && go vet ./...
      - run: cd services/${{ matrix.service }} && go test ./... -race

  # ── Rust Engines ──────────────────────────────────────────────

  engines-test:
    name: Rust Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engines
      - run: cd engines && cargo fmt --all -- --check
      - run: cd engines && cargo clippy --all-targets -- -D warnings
      - run: cd engines && cargo test --all

  # ── Build & Docker Images ────────────────────────────────────

  build:
    name: Build All
    needs: [web-test, gateway-test, services-test, engines-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build verification (non-Docker) ──
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: cd gateway && go build ./cmd/server

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engines
      - run: cd engines && cargo build --release

      # ── Docker image builds ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (PR — no push)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          images=(
            "web:deploy/docker/web.Dockerfile"
            "gateway:deploy/docker/gateway.Dockerfile"
            "user:deploy/docker/user.Dockerfile"
            "job:deploy/docker/job.Dockerfile"
            "payment:deploy/docker/payment.Dockerfile"
            "chat:deploy/docker/chat.Dockerfile"
            "notification:deploy/docker/notification.Dockerfile"
            "bidding:deploy/docker/bidding.Dockerfile"
            "fraud:deploy/docker/fraud.Dockerfile"
            "trust:deploy/docker/trust.Dockerfile"
            "imaging:deploy/docker/imaging.Dockerfile"
          )
          for entry in "${images[@]}"; do
            name="${entry%%:*}"
            dockerfile="${entry#*:}"
            echo "::group::Building nomarkup/${name}"
            docker build -f "${dockerfile}" -t "nomarkup/${name}:ci" .
            echo "::endgroup::"
          done

      - name: Build & push Docker images (main — push to registry)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
          IMAGE_PREFIX: ${{ github.repository }}
        run: |
          set -euo pipefail
          images=(
            "web:deploy/docker/web.Dockerfile"
            "gateway:deploy/docker/gateway.Dockerfile"
            "user:deploy/docker/user.Dockerfile"
            "job:deploy/docker/job.Dockerfile"
            "payment:deploy/docker/payment.Dockerfile"
            "chat:deploy/docker/chat.Dockerfile"
            "notification:deploy/docker/notification.Dockerfile"
            "bidding:deploy/docker/bidding.Dockerfile"
            "fraud:deploy/docker/fraud.Dockerfile"
            "trust:deploy/docker/trust.Dockerfile"
            "imaging:deploy/docker/imaging.Dockerfile"
          )
          for entry in "${images[@]}"; do
            name="${entry%%:*}"
            dockerfile="${entry#*:}"
            tag="${REGISTRY}/${IMAGE_PREFIX}/${name}:${GITHUB_SHA::8}"
            echo "::group::Building and tagging ${tag}"
            docker build -f "${dockerfile}" -t "${tag}" .
            echo "Built ${tag} — push step requires docker login (configure DOCKER_REGISTRY secret)"
            echo "::endgroup::"
          done
