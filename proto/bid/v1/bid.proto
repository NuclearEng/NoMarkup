syntax = "proto3";

package nomarkup.bid.v1;

option go_package = "github.com/nomarkup/nomarkup/proto/bid/v1;bidv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "user/v1/user.proto";

// ============================================================
// Bid Engine Service (Rust) — Sealed-bid reverse auction
// ============================================================

service BidService {
  // Bidding
  rpc PlaceBid(PlaceBidRequest) returns (PlaceBidResponse);
  rpc UpdateBid(UpdateBidRequest) returns (UpdateBidResponse);
  rpc WithdrawBid(WithdrawBidRequest) returns (WithdrawBidResponse);
  rpc AcceptOfferPrice(AcceptOfferPriceRequest) returns (AcceptOfferPriceResponse);

  // Award
  rpc AwardBid(AwardBidRequest) returns (AwardBidResponse);

  // Query
  rpc GetBid(GetBidRequest) returns (GetBidResponse);
  rpc ListBidsForJob(ListBidsForJobRequest) returns (ListBidsForJobResponse);
  rpc ListBidsForProvider(ListBidsForProviderRequest) returns (ListBidsForProviderResponse);
  rpc GetBidCount(GetBidCountRequest) returns (GetBidCountResponse);

  // Auction lifecycle (called by scheduler)
  rpc ExpireAuction(ExpireAuctionRequest) returns (ExpireAuctionResponse);
  rpc CheckAuctionDeadlines(CheckAuctionDeadlinesRequest) returns (CheckAuctionDeadlinesResponse);

  // Analytics
  rpc GetBidAnalytics(GetBidAnalyticsRequest) returns (GetBidAnalyticsResponse);
}

// ============================================================
// Bid Messages
// ============================================================

enum BidStatus {
  BID_STATUS_UNSPECIFIED = 0;
  BID_STATUS_ACTIVE = 1;
  BID_STATUS_AWARDED = 2;
  BID_STATUS_NOT_SELECTED = 3;
  BID_STATUS_WITHDRAWN = 4;
  BID_STATUS_EXPIRED = 5;
}

message Bid {
  string id = 1;
  string job_id = 2;
  string provider_id = 3;
  int64 amount_cents = 4;
  bool is_offer_accepted = 5;
  BidStatus status = 6;
  int64 original_amount_cents = 7;
  repeated BidUpdate bid_history = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp awarded_at = 11;
  google.protobuf.Timestamp withdrawn_at = 12;
}

message BidUpdate {
  int64 amount_cents = 1;
  google.protobuf.Timestamp updated_at = 2;
}

// Bid with provider details (for customer view)
message BidWithProvider {
  Bid bid = 1;
  string provider_display_name = 2;
  string provider_business_name = 3;
  string provider_avatar_url = 4;
  nomarkup.user.v1.TrustScoreSummary trust_score = 5;
  nomarkup.user.v1.ReviewSummary review_summary = 6;
  repeated nomarkup.user.v1.VerificationBadge badges = 7;
  int32 jobs_completed = 8;
}

// ============================================================
// Bidding RPCs
// ============================================================

message PlaceBidRequest {
  string job_id = 1;
  string provider_id = 2;
  int64 amount_cents = 3;
}

message PlaceBidResponse {
  Bid bid = 1;
}

message UpdateBidRequest {
  string bid_id = 1;
  string provider_id = 2;
  int64 new_amount_cents = 3;  // must be lower than current
}

message UpdateBidResponse {
  Bid bid = 1;
}

message WithdrawBidRequest {
  string bid_id = 1;
  string provider_id = 2;
}

message WithdrawBidResponse {
  Bid bid = 1;
}

message AcceptOfferPriceRequest {
  string job_id = 1;
  string provider_id = 2;
}

message AcceptOfferPriceResponse {
  Bid bid = 1;
}

// ============================================================
// Award RPCs
// ============================================================

message AwardBidRequest {
  string job_id = 1;
  string bid_id = 2;
  string customer_id = 3;
}

message AwardBidResponse {
  Bid awarded_bid = 1;
  string contract_id = 2;  // contract auto-generated by contract service
}

// ============================================================
// Query RPCs
// ============================================================

message GetBidRequest {
  string bid_id = 1;
  string requesting_user_id = 2;
}

message GetBidResponse {
  Bid bid = 1;
}

// Customer view: all bids on their job
message ListBidsForJobRequest {
  string job_id = 1;
  string customer_id = 2;
  nomarkup.common.v1.SortRequest sort = 3;  // price, rating, trust_score, verification
}

message ListBidsForJobResponse {
  repeated BidWithProvider bids = 1;
}

// Provider view: all their bids
message ListBidsForProviderRequest {
  string provider_id = 1;
  optional BidStatus status_filter = 2;
  nomarkup.common.v1.PaginationRequest pagination = 3;
}

message ListBidsForProviderResponse {
  repeated Bid bids = 1;
  nomarkup.common.v1.PaginationResponse pagination = 2;
}

message GetBidCountRequest {
  string job_id = 1;
}

message GetBidCountResponse {
  int32 count = 1;
}

// ============================================================
// Auction Lifecycle RPCs (internal / scheduler)
// ============================================================

message ExpireAuctionRequest {
  string job_id = 1;
}

message ExpireAuctionResponse {
  int32 bids_expired = 1;
}

message CheckAuctionDeadlinesRequest {
  google.protobuf.Timestamp before = 1;  // check auctions ending before this time
}

message CheckAuctionDeadlinesResponse {
  repeated string expired_job_ids = 1;
  repeated string closing_soon_job_ids = 2;  // < 2 hours
}

// ============================================================
// Analytics RPCs
// ============================================================

message GetBidAnalyticsRequest {
  string job_id = 1;
}

message GetBidAnalyticsResponse {
  int32 total_bids = 1;
  int64 lowest_bid_cents = 2;
  int64 highest_bid_cents = 3;
  int64 median_bid_cents = 4;
  int32 offer_accepted_count = 5;
  google.protobuf.Timestamp first_bid_at = 6;
  google.protobuf.Timestamp last_bid_at = 7;
}
