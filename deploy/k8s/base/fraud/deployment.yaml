apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud
  labels:
    app.kubernetes.io/name: fraud
    app.kubernetes.io/component: rust-engine
    app.kubernetes.io/part-of: nomarkup
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud
        app.kubernetes.io/component: rust-engine
        app.kubernetes.io/part-of: nomarkup
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50056"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: fraud
          image: ghcr.io/nomarkup/fraud:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50056
              protocol: TCP
          env:
            - name: FRAUD_ENGINE_PORT
              value: "50056"
          envFrom:
            - configMapRef:
                name: nomarkup-config
            - secretRef:
                name: nomarkup-secrets
          livenessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
