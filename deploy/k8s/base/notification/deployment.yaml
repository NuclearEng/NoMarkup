apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/component: go-service
    app.kubernetes.io/part-of: nomarkup
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification
        app.kubernetes.io/component: go-service
        app.kubernetes.io/part-of: nomarkup
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50059"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: notification
          image: ghcr.io/nomarkup/notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50059
              protocol: TCP
          env:
            - name: NOTIFICATION_SERVICE_PORT
              value: "50059"
          envFrom:
            - configMapRef:
                name: nomarkup-config
            - secretRef:
                name: nomarkup-secrets
          livenessProbe:
            grpc:
              port: 50059
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50059
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
