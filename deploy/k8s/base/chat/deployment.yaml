apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  labels:
    app.kubernetes.io/name: chat
    app.kubernetes.io/component: go-service
    app.kubernetes.io/part-of: nomarkup
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat
        app.kubernetes.io/component: go-service
        app.kubernetes.io/part-of: nomarkup
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50055"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: chat
          image: ghcr.io/nomarkup/chat:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50055
              protocol: TCP
            - name: ws
              containerPort: 50065
              protocol: TCP
          env:
            - name: CHAT_SERVICE_PORT
              value: "50055"
            - name: CHAT_WS_PORT
              value: "50065"
          envFrom:
            - configMapRef:
                name: nomarkup-config
            - secretRef:
                name: nomarkup-secrets
          livenessProbe:
            grpc:
              port: 50055
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50055
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
