apiVersion: apps/v1
kind: Deployment
metadata:
  name: bidding
  labels:
    app.kubernetes.io/name: bidding
    app.kubernetes.io/component: rust-engine
    app.kubernetes.io/part-of: nomarkup
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: bidding
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bidding
        app.kubernetes.io/component: rust-engine
        app.kubernetes.io/part-of: nomarkup
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50053"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: bidding
          image: ghcr.io/nomarkup/bidding:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50053
              protocol: TCP
          env:
            - name: BID_ENGINE_PORT
              value: "50053"
          envFrom:
            - configMapRef:
                name: nomarkup-config
            - secretRef:
                name: nomarkup-secrets
          livenessProbe:
            grpc:
              port: 50053
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
