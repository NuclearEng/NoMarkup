apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nomarkup

resources:
  - ../../base
  - hpa.yaml

patches:
  # Gateway: 3 replicas in production
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  # Web: 2 replicas in production
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  # Go services: 2 replicas each in production
  - target:
      kind: Deployment
      name: user
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: job
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: payment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: chat
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: notification
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  # Rust engines: 2 replicas each in production
  - target:
      kind: Deployment
      name: bidding
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: fraud
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: trust
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: imaging
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  # Production: use Always imagePullPolicy
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always

configMapGenerator:
  - name: nomarkup-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - MEILISEARCH_URL=http://meilisearch:7700
