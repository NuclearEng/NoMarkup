apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nomarkup-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  # Gateway: 1 replica in staging
  - target:
      kind: Deployment
      name: gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Web: 1 replica in staging
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Go services: 1 replica each in staging
  - target:
      kind: Deployment
      name: user
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: job
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: payment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: chat
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: notification
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Rust engines: 1 replica each in staging
  - target:
      kind: Deployment
      name: bidding
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: fraud
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: trust
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: imaging
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

configMapGenerator:
  - name: nomarkup-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=debug
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - MEILISEARCH_URL=http://meilisearch:7700
